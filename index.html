<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Bootstrap Form</title>
    <!--Link stylesheet for bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center">
            <form id="userForm" class="col-4 shadow p-3 mb-5 bg-body-tertiary rounded">
                <h3 class="text-info">USER INFORMATION FORM</h3>
                <div class="mb-3">
                <label for="fullname" class="form-label">Fullnanme :</label>
                <div class="input-group">
                    <span class="input-group-text">   
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" id="fullname" placeholder="Enter your fullname" required>
                </div>
                </div>

             
                <label for="gender"class="form=label">Gender</label>
                <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender"
               id="male" value="male" checked>
             <label class="form-check-label" for="male">Male</label>
          </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" id="female" value="female">
             <label class="form-check-label" for="female">Female</label>
          </div>

                <div class="mb-3">
                    <label for="salary" class="form-label">Salary :</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-currency-dollar"></i>
                        </span>
                        <input type="number" class="form-control" id="salary" placeholder="Enter your salary" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="dob" class="form-label">DateofBirth :</label>
                    <input type="date" class="form-control" id="dob" required>
                </div>

                <div class="mb-3">
                    <label for="position" class="form-label">Position :</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-bag"></i>
                        </span>
                    <select id="position" class="form-select">
                        <option value="IT Support">IT Support</option>
                        <option value="IT Manager">IT Manager</option>
                        <option value="Designer">Designer</option>
                        <option value="Account">Account</option>
                    </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description :</label>
                    <textarea id="description" class="form-control" placeholder="Enter your description"></textarea>

                </div>
                <div class="mb-3">
                <button  type="submit" class="btn btn-primary w-25 me-3">Submit</button>
                <button type="reset" class="btn btn-outline-danger w-25">Clear</button>
                  <div id="result" class="mt-3" >
                  </div>
               
            </form>

            </div>
            
       <div id="result" class="mt-3" ></div>
   
</body>
<!--Link for boostrap-->
<script src="./index.js"></script>
<!--Link Javascript for bootstrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
